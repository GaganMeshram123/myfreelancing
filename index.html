    <!-- CSS/Styles override for base scroll behavior -->
    <style>
      html, body {
        background-color: #050505;
        color: #ffffff;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        font-family: 'Outfit', 'Inter', sans-serif;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #1a1a1a;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {

      }
